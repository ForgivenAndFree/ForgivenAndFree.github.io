<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    :root {
      --sidebar-width: 260px;
      --content-width: 700px;
      --gap: 2em;
      --text-color: #333;
      --bg-color: #fff;
      --sidebar-bg: #f5f5f0;
      --link-color: #4a2c0a;
      --link-hover: #8b4513;
      --border-color: #ddd;
      --accent: #8b4513;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text-color);
      background: var(--bg-color);
      line-height: 1.7;
    }

    /* Page wrapper — centers the two-column layout */
    .page-wrapper {
      max-width: calc(var(--sidebar-width) + var(--gap) + var(--content-width));
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      padding: 2em 1em;
      gap: var(--gap);
    }

    /* Sidebar — sticks to the left of the content */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      position: sticky;
      top: 2em;
      max-height: calc(100vh - 4em);
      overflow-y: auto;
      background: var(--sidebar-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 1.2em 1em;
      font-size: 0.85em;
    }

    .sidebar h3 {
      font-size: 1.1em;
      margin-bottom: 0.8em;
      padding-bottom: 0.5em;
      border-bottom: 2px solid var(--accent);
    }

    .sidebar h3 a {
      color: var(--accent);
      text-decoration: none;
    }

    .sidebar ol {
      list-style: none;
      padding: 0;
      counter-reset: chapter;
    }

    .sidebar ol li {
      counter-increment: chapter;
      margin-bottom: 0.3em;
    }

    .sidebar ol li a {
      color: var(--text-color);
      text-decoration: none;
      display: block;
      padding: 0.25em 0.4em;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .sidebar ol li a::before {
      content: counter(chapter) ". ";
      color: var(--accent);
      font-weight: bold;
    }

    .sidebar ol li a:hover {
      background: rgba(139, 69, 19, 0.1);
      color: var(--link-hover);
    }

    /* Main content */
    .main-content {
      flex: 1;
      max-width: var(--content-width);
      min-width: 0;
    }

    .main-content h1 {
      font-size: 1.8em;
      margin-bottom: 0.5em;
      color: var(--accent);
    }

    .main-content h2 {
      font-size: 1.4em;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      color: var(--accent);
    }

    .main-content h3 {
      font-size: 1.15em;
      margin-top: 1.3em;
      margin-bottom: 0.4em;
    }

    .main-content p {
      margin-bottom: 1em;
    }

    .main-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 1em 0;
      padding: 0.5em 1em;
      color: #555;
      font-style: italic;
      background: #faf8f5;
    }

    .main-content ul, .main-content ol {
      margin: 1em 0;
      padding-left: 1.5em;
    }

    .main-content li {
      margin-bottom: 0.4em;
    }

    .main-content a {
      color: var(--link-color);
    }

    .main-content a:hover {
      color: var(--link-hover);
    }

    .main-content hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 2em 0;
    }

    .main-content strong {
      color: #222;
    }

    .main-content nav {
      font-size: 0.95em;
    }

    /* Mobile dropdown toggle */
    .mobile-nav {
      display: none;
    }

    .mobile-nav summary {
      background: var(--accent);
      color: #fff;
      padding: 0.6em 1em;
      font-size: 1em;
      font-family: Georgia, 'Times New Roman', serif;
      border-radius: 6px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .mobile-nav summary::-webkit-details-marker {
      display: none;
    }

    .mobile-nav summary::after {
      content: " ▼";
      font-size: 0.7em;
    }

    .mobile-nav[open] summary::after {
      content: " ▲";
      font-size: 0.7em;
    }

    .mobile-nav .mobile-nav-list {
      background: var(--sidebar-bg);
      border: 1px solid var(--border-color);
      border-radius: 0 0 6px 6px;
      padding: 0.8em 1em;
      margin-top: 0;
    }

    .mobile-nav .mobile-nav-list ol {
      list-style: none;
      padding: 0;
      counter-reset: chapter;
    }

    .mobile-nav .mobile-nav-list ol li {
      counter-increment: chapter;
      margin-bottom: 0.2em;
    }

    .mobile-nav .mobile-nav-list ol li a {
      color: var(--text-color);
      text-decoration: none;
      display: block;
      padding: 0.3em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .mobile-nav .mobile-nav-list ol li a::before {
      content: counter(chapter) ". ";
      color: var(--accent);
      font-weight: bold;
    }

    .mobile-nav .mobile-nav-list ol li a:hover {
      background: rgba(139, 69, 19, 0.1);
    }

    @media (max-width: 860px) {
      .page-wrapper {
        flex-direction: column;
        padding: 1em;
      }
      .sidebar {
        display: none;
      }
      .mobile-nav {
        display: block;
        margin-bottom: 1em;
      }
      .main-content {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    {% include sidebar.html %}
    <div class="main-content">
      <details class="mobile-nav">
        <summary>Table of Contents</summary>
        <div class="mobile-nav-list">
          {% include toc-list.html %}
        </div>
      </details>
      {{ content }}
    </div>
  </div>
</body>
</html>
