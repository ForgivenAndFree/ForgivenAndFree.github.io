<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1208;
      --parchment: #f5efe0;
      --parchment-dark: #e8dfc8;
      --parchment-mid: #ede4ce;
      --red: #8b1a1a;
      --red-light: #b52a2a;
      --gold: #9a7b2e;
      --gold-light: #c4a04a;
      --shadow: rgba(26,18,8,0.15);
      --sidebar-width: 260px;
      --content-width: 700px;
      --gap: 2em;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #2a1f0e;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(80,50,10,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(60,30,5,0.3) 0%, transparent 60%);
      font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
      color: var(--ink);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Site header */
    .site-header {
      background: var(--ink);
      border-bottom: 2px solid var(--gold);
    }

    .site-header-inner {
      max-width: calc(var(--sidebar-width) + var(--gap) + var(--content-width) + 4em);
      margin: 0 auto;
      padding: 0.8em 2em;
      display: flex;
      align-items: center;
      gap: 0.8em;
    }

    .site-header img {
      height: 44px;
      width: auto;
    }

    .site-header-text {
      display: flex;
      flex-direction: column;
    }

    .site-header-text a {
      text-decoration: none;
      color: var(--gold-light);
      font-size: 1.35em;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .site-header-text .site-tagline {
      font-size: 0.82em;
      color: #9a8a6a;
      font-style: italic;
      line-height: 1.3;
    }

    /* Page wrapper */
    .page-wrapper {
      max-width: calc(var(--sidebar-width) + var(--gap) + var(--content-width) + 4em);
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      padding: 2em 2em;
      gap: var(--gap);
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      position: sticky;
      top: 1em;
      max-height: calc(100vh - 2em);
      overflow-y: auto;
      background: var(--parchment-mid);
      border: 1px solid var(--gold);
      border-radius: 4px;
      padding: 1.2em 1em;
      font-size: 0.85em;
      box-shadow: 0 4px 20px var(--shadow);
    }

    .sidebar h3 {
      font-size: 1.05em;
      margin-bottom: 0.8em;
      padding-bottom: 0.5em;
      border-bottom: 1px solid var(--gold);
      color: var(--gold);
      font-weight: 700;
    }

    .sidebar h3 a {
      color: var(--gold);
      text-decoration: none;
    }

    .sidebar h4.sidebar-section {
      font-size: 0.8em;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 1em;
      margin-bottom: 0.4em;
      padding-top: 0.8em;
      border-top: 1px solid var(--parchment-dark);
    }

    .sidebar ol {
      list-style: none;
      padding: 0;
      counter-reset: chapter;
    }

    .sidebar ol li {
      counter-increment: chapter;
      margin-bottom: 0.15em;
    }

    .sidebar ol li a {
      color: var(--ink);
      text-decoration: none;
      display: block;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .sidebar ol li a::before {
      content: counter(chapter) ". ";
      color: var(--gold);
      font-weight: 600;
      font-size: 0.9em;
    }

    .sidebar ol li a:hover {
      background: rgba(154, 123, 46, 0.12);
      color: var(--red);
    }

    .sidebar ul.sidebar-resources {
      list-style: none;
      padding: 0;
    }

    .sidebar ul.sidebar-resources li {
      margin-bottom: 0.15em;
    }

    .sidebar ul.sidebar-resources li a {
      color: var(--ink);
      text-decoration: none;
      display: block;
      padding: 0.2em 0.4em;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .sidebar ul.sidebar-resources li a:hover {
      background: rgba(154, 123, 46, 0.12);
      color: var(--red);
    }

    /* Main content */
    .main-content {
      flex: 1;
      max-width: var(--content-width);
      min-width: 0;
      background: var(--parchment);
      border: 1px solid var(--gold);
      border-radius: 4px;
      padding: 2.5em 2.5em;
      box-shadow: 0 4px 20px var(--shadow);
    }

    .main-content h1 {
      font-size: 1.8em;
      margin-bottom: 0.5em;
      color: var(--ink);
      font-weight: 700;
      line-height: 1.25;
    }

    .main-content h2 {
      font-size: 1.4em;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      color: var(--red);
      font-weight: 700;
    }

    .main-content h3 {
      font-size: 1.15em;
      margin-top: 1.3em;
      margin-bottom: 0.4em;
      color: var(--ink);
    }

    .main-content p {
      margin-bottom: 1em;
    }

    .main-content blockquote {
      border-left: 3px solid var(--red);
      margin: 1em 0;
      padding: 0.5em 1.2em;
      color: #3a2810;
      font-style: italic;
      background: rgba(240, 230, 206, 0.5);
    }

    .main-content ul, .main-content ol {
      margin: 1em 0;
      padding-left: 1.5em;
    }

    .main-content li {
      margin-bottom: 0.4em;
    }

    .main-content a {
      color: var(--red);
      text-decoration: none;
      border-bottom: 1px solid rgba(139, 26, 26, 0.3);
    }

    .main-content a:hover {
      color: var(--red-light);
      border-bottom-color: var(--red-light);
    }

    .main-content hr {
      border: none;
      border-top: 1px solid var(--gold);
      margin: 2em 0;
    }

    .main-content strong {
      color: var(--ink);
      font-weight: 600;
    }

    .main-content nav {
      font-size: 0.95em;
    }

    .main-content nav a {
      border-bottom: none;
    }

    /* Mobile dropdown */
    .mobile-nav {
      display: none;
    }

    .mobile-nav summary {
      background: var(--ink);
      color: var(--gold-light);
      padding: 0.6em 1em;
      font-size: 1em;
      font-family: 'EB Garamond', Georgia, serif;
      border-radius: 4px;
      cursor: pointer;
      list-style: none;
      user-select: none;
      border: 1px solid var(--gold);
    }

    .mobile-nav summary::-webkit-details-marker {
      display: none;
    }

    .mobile-nav summary::after {
      content: " \25BE";
      font-size: 0.8em;
    }

    .mobile-nav[open] summary::after {
      content: " \25B4";
      font-size: 0.8em;
    }

    .mobile-nav .mobile-nav-list {
      background: var(--parchment-mid);
      border: 1px solid var(--gold);
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 0.8em 1em;
      margin-top: 0;
    }

    .mobile-nav .mobile-nav-list ol {
      list-style: none;
      padding: 0;
      counter-reset: chapter;
    }

    .mobile-nav .mobile-nav-list ol li {
      counter-increment: chapter;
      margin-bottom: 0.2em;
    }

    .mobile-nav .mobile-nav-list ol li a {
      color: var(--ink);
      text-decoration: none;
      display: block;
      padding: 0.3em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
      border-bottom: none;
    }

    .mobile-nav .mobile-nav-list ol li a::before {
      content: counter(chapter) ". ";
      color: var(--gold);
      font-weight: 600;
    }

    .mobile-nav .mobile-nav-list ol li a:hover {
      background: rgba(154, 123, 46, 0.12);
    }

    .mobile-nav .mobile-nav-list h4 {
      font-size: 0.75em;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-top: 0.8em;
      margin-bottom: 0.3em;
      padding-top: 0.6em;
      border-top: 1px solid var(--parchment-dark);
    }

    .mobile-nav .mobile-nav-list ul {
      list-style: none;
      padding: 0;
    }

    .mobile-nav .mobile-nav-list ul li a {
      color: var(--ink);
      text-decoration: none;
      display: block;
      padding: 0.3em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
      border-bottom: none;
    }

    .mobile-nav .mobile-nav-list ul li a:hover {
      background: rgba(154, 123, 46, 0.12);
    }

    @media (max-width: 860px) {
      .site-header-inner {
        padding: 0.7em 1em;
      }
      .site-header img {
        height: 36px;
      }
      .site-header-text a {
        font-size: 1.15em;
      }
      .page-wrapper {
        flex-direction: column;
        padding: 1em;
      }
      .sidebar {
        display: none;
      }
      .mobile-nav {
        display: block;
        margin-bottom: 1em;
      }
      .main-content {
        max-width: 100%;
        padding: 1.5em 1.2em;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ site.baseurl }}/"><img src="{{ site.baseurl }}/images/Lutheran-Rose.png" alt="Lutheran Rose"></a>
      <div class="site-header-text">
        <a href="{{ site.baseurl }}/">Forgiven and Free</a>
        <span class="site-tagline">A Lutheran Method for Escaping the Pornography Trap</span>
      </div>
    </div>
  </header>
  <div class="page-wrapper">
    {% include sidebar.html %}
    <div class="main-content">
      <details class="mobile-nav">
        <summary>Table of Contents</summary>
        <div class="mobile-nav-list">
          {% include toc-list.html %}
        </div>
      </details>
      {{ content }}
    </div>
  </div>
</body>
</html>
