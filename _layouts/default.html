<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <style>
    :root {
      --sidebar-width: 280px;
      --text-color: #333;
      --bg-color: #fff;
      --sidebar-bg: #f5f5f0;
      --link-color: #4a2c0a;
      --link-hover: #8b4513;
      --border-color: #ddd;
      --accent: #8b4513;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--text-color);
      background: var(--bg-color);
      line-height: 1.7;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-width);
      height: 100vh;
      overflow-y: auto;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-color);
      padding: 1.5em 1em;
      font-size: 0.85em;
    }

    .sidebar h3 {
      font-size: 1.1em;
      margin-bottom: 0.8em;
      padding-bottom: 0.5em;
      border-bottom: 2px solid var(--accent);
    }

    .sidebar h3 a {
      color: var(--accent);
      text-decoration: none;
    }

    .sidebar ol {
      list-style: none;
      padding: 0;
      counter-reset: chapter;
    }

    .sidebar ol li {
      counter-increment: chapter;
      margin-bottom: 0.3em;
    }

    .sidebar ol li a {
      color: var(--text-color);
      text-decoration: none;
      display: block;
      padding: 0.25em 0.4em;
      border-radius: 3px;
      transition: background 0.15s;
    }

    .sidebar ol li a::before {
      content: counter(chapter) ". ";
      color: var(--accent);
      font-weight: bold;
    }

    .sidebar ol li a:hover {
      background: rgba(139, 69, 19, 0.1);
      color: var(--link-hover);
    }

    /* Main content */
    .main-content {
      margin-left: var(--sidebar-width);
      max-width: 750px;
      padding: 2em 3em;
    }

    .main-content h1 {
      font-size: 1.8em;
      margin-bottom: 0.5em;
      color: var(--accent);
    }

    .main-content h2 {
      font-size: 1.4em;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      color: var(--accent);
    }

    .main-content h3 {
      font-size: 1.15em;
      margin-top: 1.3em;
      margin-bottom: 0.4em;
    }

    .main-content p {
      margin-bottom: 1em;
    }

    .main-content blockquote {
      border-left: 3px solid var(--accent);
      margin: 1em 0;
      padding: 0.5em 1em;
      color: #555;
      font-style: italic;
      background: #faf8f5;
    }

    .main-content ul, .main-content ol {
      margin: 1em 0;
      padding-left: 1.5em;
    }

    .main-content li {
      margin-bottom: 0.4em;
    }

    .main-content a {
      color: var(--link-color);
    }

    .main-content a:hover {
      color: var(--link-hover);
    }

    .main-content hr {
      border: none;
      border-top: 1px solid var(--border-color);
      margin: 2em 0;
    }

    .main-content strong {
      color: #222;
    }

    .main-content nav {
      font-size: 0.95em;
    }

    /* Mobile toggle */
    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 0.8em;
      left: 0.8em;
      z-index: 1000;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5em 0.7em;
      font-size: 1.2em;
      border-radius: 4px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        transition: transform 0.3s;
        z-index: 999;
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-toggle {
        display: block;
      }
      .main-content {
        margin-left: 0;
        padding: 3em 1.5em 2em;
      }
    }
  </style>
</head>
<body>
  <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')" aria-label="Toggle navigation">&#9776;</button>
  {% include sidebar.html %}
  <div class="main-content">
    {{ content }}
  </div>
</body>
</html>
